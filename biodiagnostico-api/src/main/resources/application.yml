spring:
  application:
    name: biodiagnostico-api
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:true}

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:900000}
  refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800000}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-1.5-flash}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  password-reset:
    path: ${PASSWORD_RESET_PATH:/reset-password}
    token-ttl-minutes: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:60}
    expose-link-in-response: ${PASSWORD_RESET_EXPOSE_LINK:false}
    from-email: ${PASSWORD_RESET_FROM_EMAIL:${spring.mail.username:no-reply@biodiagnostico.local}}
