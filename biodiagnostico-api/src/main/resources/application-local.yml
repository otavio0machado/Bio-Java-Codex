spring:
  datasource:
    url: jdbc:h2:mem:biodiagnostico;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: localdevsecretthatislongenoughforjwtandtestingpurposes
  issuer: biodiagnostico-api-local

cors:
  allowed-origins: http://localhost:5173

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  frontend-url: http://localhost:5173
  auth:
    refresh-cookie:
      secure: false
      same-site: Lax
    login-rate-limit:
      max-attempts: 20
      window-seconds: 60
  password-reset:
    expose-link-in-response: true
